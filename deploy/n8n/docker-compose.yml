services:
  postgres:
    image: postgres:16
    container_name: coa-n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:${N8N_VERSION:-2.30.7}
    container_name: coa-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      N8N_HOST: ${N8N_HOST:-n8n.coanews.co.kr}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${WEBHOOK_URL:-https://n8n.coanews.co.kr/}
      GENERIC_TIMEZONE: Asia/Seoul
      TZ: Asia/Seoul
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_HIRING_BANNER_ENABLED: "false"
      N8N_SECURE_COOKIE: "true"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_MODEL_CLASSIFY: ${OPENAI_MODEL_CLASSIFY:-gpt-5.4-nano}
      OPENAI_MODEL_SUGGEST: ${OPENAI_MODEL_SUGGEST:-gpt-5-mini}
      OPENAI_MODEL_DRAFT: ${OPENAI_MODEL_DRAFT:-gpt-5-mini}
      OPENAI_MODEL_PREMIUM: ${OPENAI_MODEL_PREMIUM:-gpt-5.4-mini}
      SUPABASE_URL: ${SUPABASE_URL:?SUPABASE_URL is required}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-336}
      AGENT_REACH_RUNNER_URL: ${AGENT_REACH_RUNNER_URL:-http://host.docker.internal:8787/run}
      AGENT_REACH_RUNNER_SECRET: ${AGENT_REACH_RUNNER_SECRET:?AGENT_REACH_RUNNER_SECRET is required}
      AGENT_REACH_WEBHOOK_SECRET: ${AGENT_REACH_WEBHOOK_SECRET:?AGENT_REACH_WEBHOOK_SECRET is required}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5678/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: coa_n8n_postgres_data
  n8n_data:
    name: coa_n8n_data
