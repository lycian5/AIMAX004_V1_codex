services:
  n8n:
    image: n8nio/n8n:latest
    container_name: coa-n8n
    restart: unless-stopped
    ports:
      - "${N8N_BIND_HOST:-0.0.0.0}:5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-0.0.0.0}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - GENERIC_TIMEZONE=Asia/Seoul
      - TZ=Asia/Seoul
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_HIRING_BANNER_ENABLED=false
      - AGENT_REACH_WEBHOOK_SECRET=${AGENT_REACH_WEBHOOK_SECRET}
      - AGENT_REACH_RUNNER_SECRET=${AGENT_REACH_RUNNER_SECRET}
      - AGENT_REACH_RUNNER_URL=${AGENT_REACH_RUNNER_URL:-http://host.docker.internal:8787/run}
    volumes:
      - ./n8n-data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5678/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
