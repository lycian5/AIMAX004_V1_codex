<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>COA NEWS 편집 초안</title><style>
:root{font-family:Arial,sans-serif;color:#18212a;background:#eef2f4;--blue:#087ea4;--line:#d7e0e4;--muted:#65747d;--good:#087a43;--bad:#b42318}*{box-sizing:border-box}body{margin:0}.top{background:#087ea4;color:#fff;padding:18px 24px}.top h1{margin:0;font-size:21px}.toolbar{max-width:1200px;margin:18px auto;padding:0 16px;display:flex;gap:10px}.toolbar input,.toolbar select{border:1px solid #b9c8cf;border-radius:5px;padding:10px}.toolbar input{flex:1}.btn{border:0;border-radius:5px;padding:10px 15px;font-weight:700;cursor:pointer;background:var(--blue);color:#fff}.btn.gray{background:#fff;color:#24313a;border:1px solid #b9c8cf}.btn.good{background:var(--good)}.btn.bad{background:var(--bad)}main{max-width:1200px;margin:auto;padding:0 16px 30px;display:grid;grid-template-columns:320px 1fr;gap:16px}.panel{background:#fff;border:1px solid var(--line);border-radius:8px}.list{max-height:calc(100vh - 150px);overflow:auto}.item{width:100%;text-align:left;padding:13px;border:0;border-bottom:1px solid var(--line);background:#fff;cursor:pointer}.item.active,.item:hover{background:#eef8fb}.item strong{display:block;line-height:1.35}.meta{font-size:12px;color:var(--muted)}.editor{padding:20px}.field{margin-bottom:13px}.field label{display:block;font-weight:700;font-size:12px;margin-bottom:5px}.field input,.field textarea{width:100%;border:1px solid #b9c8cf;border-radius:5px;padding:10px;font:inherit}.field textarea{min-height:80px}.field textarea.body{min-height:360px;font-family:Consolas,monospace}.actions{display:flex;gap:8px;flex-wrap:wrap}.empty{padding:45px 18px;text-align:center;color:var(--muted)}@media(max-width:760px){main{grid-template-columns:1fr}.list{max-height:280px}.toolbar{flex-wrap:wrap}}
</style></head><body><header class="top"><h1>COA NEWS 편집 초안</h1></header><section class="toolbar"><input id="key" type="password" placeholder="CRON_SECRET"><select id="status"><option value="">전체 상태</option><option value="draft">작성 중</option><option value="pending_editor_approval">편집장 승인대기</option><option value="approved">승인</option><option value="rejected">반려</option></select><button class="btn" id="load">불러오기</button><a class="btn gray" href="/research-briefs">리서치 브리프</a></section><main><section class="panel list" id="list"><div class="empty">초안을 불러오세요.</div></section><section class="panel editor" id="editor"><div class="empty">왼쪽에서 초안을 선택하세요.</div></section></main><script>
const $=id=>document.getElementById(id);let drafts=[],selected=null;$('load').onclick=load;async function api(method,body,query=''){const r=await fetch('/api/editorial/drafts'+query,{method,headers:{'Content-Type':'application/json',Authorization:`Bearer ${$('key').value.trim()}`},body:body?JSON.stringify(body):undefined});const d=await r.json();if(!r.ok)throw new Error(d.error||`HTTP ${r.status}`);return d;}async function load(){if(!$('key').value.trim())return alert('인증키를 입력하세요.');const q=$('status').value?'?status='+encodeURIComponent($('status').value):'';try{drafts=(await api('GET',null,q)).drafts;renderList();if(drafts[0])show(drafts[0].id);}catch(e){alert(e.message)}}function renderList(){$('list').innerHTML=drafts.length?drafts.map(d=>`<button class="item ${selected===d.id?'active':''}" data-id="${d.id}"><strong>${esc(d.title)}</strong><span class="meta">${label(d.status)} · ${new Date(d.updated_at).toLocaleString()}</span></button>`).join(''):'<div class="empty">초안이 없습니다.</div>';$('list').querySelectorAll('[data-id]').forEach(e=>e.onclick=()=>show(Number(e.dataset.id)));}function show(id){selected=id;renderList();const d=drafts.find(x=>x.id===id);$('editor').innerHTML=`<div class="meta">초안 #${d.id} · ${label(d.status)} · 모델 ${esc(d.model||'')}</div><div class="field"><label>제목</label><input id="title" value="${esc(d.title)}"></div><div class="field"><label>부제</label><input id="subtitle" value="${esc(d.subtitle||'')}"></div><div class="field"><label>요약</label><textarea id="summary">${esc(d.summary||'')}</textarea></div><div class="field"><label>본문 HTML</label><textarea class="body" id="body">${esc(d.body_html)}</textarea></div><div class="field"><label>태그 (쉼표 구분)</label><input id="tags" value="${esc((d.tags||[]).join(', '))}"></div><div class="field"><label>편집 메모</label><textarea id="notes">${esc(d.editorial_notes||'')}</textarea></div><div class="actions"><button class="btn gray" id="save">저장</button><button class="btn" id="submit">뉴스등록·승인대기</button><button class="btn good" id="approve">승인</button><button class="btn bad" id="reject">반려</button><button class="btn gray" id="copy">등록용 복사</button><button class="btn gray" id="json">JSON 내보내기</button></div>`;$('save').onclick=()=>act('save');$('submit').onclick=()=>act('submit');$('approve').onclick=()=>act('approve');$('reject').onclick=()=>act('reject');$('copy').onclick=copyPackage;$('json').onclick=downloadJson;}async function act(action){try{const body={id:selected,action,title:$('title').value,subtitle:$('subtitle').value,summary:$('summary').value,bodyHtml:$('body').value,tags:$('tags').value.split(',').map(x=>x.trim()).filter(Boolean),editorialNotes:$('notes').value};const updated=(await api('PATCH',body)).draft;drafts=drafts.map(d=>d.id===updated.id?updated:d);show(updated.id);alert('처리했습니다.');}catch(e){alert(e.message)}}async function copyPackage(){const d=currentPayload();await navigator.clipboard.writeText(`제목: ${d.title}\n부제: ${d.subtitle}\n태그: ${d.tags.join(', ')}\n\n${d.body_html}`);alert('등록용 내용을 복사했습니다.');}function downloadJson(){const d=currentPayload();const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(d,null,2)],{type:'application/json'}));a.download=`coanews-draft-${selected}.json`;a.click();URL.revokeObjectURL(a.href);}function currentPayload(){return{schema_version:'coanews-draft/1.0',draft_id:selected,status:drafts.find(d=>d.id===selected).status,title:$('title').value,subtitle:$('subtitle').value,summary:$('summary').value,body_html:$('body').value,tags:$('tags').value.split(',').map(x=>x.trim()).filter(Boolean),editorial_notes:$('notes').value};}function label(v){return{draft:'작성 중',pending_editor_approval:'편집장 승인대기',approved:'승인',rejected:'반려'}[v]||v}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script></body></html>
