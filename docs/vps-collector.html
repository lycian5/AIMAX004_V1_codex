<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>COA NEWS VPS 수집</title>
  <style>
    :root{font-family:Arial,sans-serif;color:#17202a;background:#f4f7f9}*{box-sizing:border-box}
    body{margin:0}.top{background:#087ea4;color:#fff;padding:18px 24px}.top h1{font-size:21px;margin:0}.top p{margin:5px 0 0;font-size:13px}
    main{max-width:880px;margin:24px auto;padding:0 16px}.panel{background:#fff;border:1px solid #dce4e8;border-radius:8px;padding:20px;margin-bottom:16px}
    h2{font-size:17px;margin:0 0 16px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
    input,textarea{width:100%;border:1px solid #bdcbd2;border-radius:5px;padding:10px;font:inherit}textarea{min-height:95px;resize:vertical}.checks{display:flex;gap:18px;flex-wrap:wrap}.checks label{font-size:14px}.checks input{width:auto}
    .hint{font-size:12px;color:#5f6f78;margin-top:6px}.actions{display:flex;gap:10px;align-items:center}.btn{border:0;border-radius:5px;padding:11px 18px;font-weight:700;cursor:pointer}.primary{background:#087ea4;color:#fff}.btn:disabled{opacity:.55;cursor:wait}
    pre{white-space:pre-wrap;word-break:break-word;background:#111b22;color:#d9edf4;padding:15px;border-radius:6px;min-height:100px}.ok{color:#087a43}.error{color:#b42318}
    @media(max-width:640px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="top"><h1>COA NEWS VPS 수집</h1><p>선택한 조건으로 Agent Reach를 실행하고 Supabase에 저장합니다.</p></header>
  <main>
    <section class="panel">
      <h2>수집 조건</h2>
      <div class="checks">
        <label><input type="checkbox" name="source" value="exa" checked /> Exa</label>
        <label><input type="checkbox" name="source" value="rss" checked /> RSS</label>
        <label><input type="checkbox" name="source" value="youtube" /> YouTube</label>
        <label><input type="checkbox" name="source" value="github" /> GitHub</label>
      </div>
      <p class="hint">YouTube와 GitHub는 VPS 인증 설정 후 선택하세요.</p>
      <div class="grid">
        <div class="field"><label for="limitKeywords">처리할 키워드 수</label><input id="limitKeywords" type="number" min="1" max="30" value="6" /></div>
        <div class="field"><label for="exaResults">Exa 결과 수</label><input id="exaResults" type="number" min="1" max="10" value="5" /></div>
        <div class="field"><label for="rssResults">RSS 결과 수</label><input id="rssResults" type="number" min="1" max="20" value="8" /></div>
        <div class="field"><label for="adminKey">실행 인증키</label><input id="adminKey" type="password" autocomplete="off" placeholder="CRON_SECRET" /></div>
      </div>
      <div class="field" style="margin-top:14px"><label for="keywords">직접 키워드 (선택)</label><textarea id="keywords" placeholder="AI 스타트업, 소상공인 지원, 업무 자동화"></textarea></div>
    </section>
    <section class="panel">
      <div class="actions"><button id="run" class="btn primary">VPS 수집 실행</button><strong id="status">준비</strong></div>
      <pre id="result">실행 결과가 여기에 표시됩니다.</pre>
    </section>
  </main>
  <script>
    const run = document.getElementById('run');
    const status = document.getElementById('status');
    const result = document.getElementById('result');
    run.addEventListener('click', async () => {
      const key = document.getElementById('adminKey').value.trim();
      const sources = [...document.querySelectorAll('[name=source]:checked')].map(el => el.value);
      if (!key) return show('실행 인증키를 입력하세요.', false);
      if (!sources.length) return show('수집 채널을 하나 이상 선택하세요.', false);
      run.disabled = true; status.textContent = '수집 중'; status.className = '';
      result.textContent = 'VPS에서 수집하고 있습니다...';
      try {
        const response = await fetch('/api/cron/agent-reach', {
          method: 'POST',
          headers: {'Content-Type':'application/json','Authorization':`Bearer ${key}`},
          body: JSON.stringify({
            sources,
            limitKeywords: document.getElementById('limitKeywords').value,
            exaResults: document.getElementById('exaResults').value,
            rssResults: document.getElementById('rssResults').value,
            keywords: document.getElementById('keywords').value,
          }),
        });
        const data = await response.json();
        show(JSON.stringify(data, null, 2), response.ok && data.ok !== false);
      } catch (error) { show(error.message, false); }
      finally { run.disabled = false; }
    });
    function show(message, ok) { status.textContent = ok ? '완료' : '실패'; status.className = ok ? 'ok' : 'error'; result.textContent = message; }
  </script>
</body>
</html>
