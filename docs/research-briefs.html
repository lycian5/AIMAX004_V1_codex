<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>COA NEWS 리서치 브리프</title>
  <style>
    :root{font-family:Arial,sans-serif;color:#18212a;background:#eef2f4;--blue:#087ea4;--line:#d7e0e4;--muted:#65747d;--good:#087a43;--warn:#a15c00}*{box-sizing:border-box}
    body{margin:0}.top{background:#087ea4;color:#fff;padding:18px 24px}.top h1{font-size:21px;margin:0}.top p{font-size:13px;margin:5px 0 0}
    .toolbar{display:flex;gap:10px;align-items:end;max-width:1200px;margin:18px auto;padding:0 16px}.field{flex:1}.field.small{max-width:180px}.field label{display:block;font-size:12px;font-weight:700;margin-bottom:5px}input,select{width:100%;border:1px solid #b9c8cf;border-radius:5px;padding:10px;background:#fff}.btn{border:0;border-radius:5px;padding:11px 16px;font-weight:700;cursor:pointer;background:var(--blue);color:#fff}.btn.secondary{background:#fff;color:#24313a;border:1px solid #b9c8cf}.btn:disabled{opacity:.55}
    main{max-width:1200px;margin:0 auto 32px;padding:0 16px;display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px}.panel{background:#fff;border:1px solid var(--line);border-radius:8px;min-width:0}.list{max-height:calc(100vh - 170px);overflow:auto}.item{display:block;width:100%;text-align:left;border:0;border-bottom:1px solid var(--line);background:#fff;padding:14px;cursor:pointer}.item:hover,.item.active{background:#eef8fb}.item strong{display:block;line-height:1.4}.meta,.muted{color:var(--muted);font-size:12px}.badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.badge{font-size:11px;padding:3px 7px;border-radius:4px;background:#edf2f4}.official{color:var(--good);background:#e8f6ee}.detail{padding:22px;min-height:520px}.detail h2{font-size:22px;line-height:1.4;margin:0 0 8px}.section{border-top:1px solid var(--line);padding-top:18px;margin-top:18px}.section h3{font-size:15px;margin:0 0 10px}.fact,.article{padding:10px 0;border-bottom:1px solid #edf1f2}.fact:last-child,.article:last-child{border-bottom:0}.fact-type{font-size:11px;color:var(--blue);font-weight:700;margin-right:7px}.article a{color:#12688a;text-decoration:none}.article p{font-size:13px;color:#4e5d66;margin:5px 0}.empty{padding:50px 20px;text-align:center;color:var(--muted)}.actions{display:flex;gap:8px;margin-top:18px}
    @media(max-width:760px){.toolbar{flex-wrap:wrap}.field.small{max-width:none}.toolbar .field{min-width:140px}main{grid-template-columns:1fr}.list{max-height:330px}}
  </style>
</head>
<body>
  <header class="top"><h1>COA NEWS 리서치 브리프</h1><p>수집된 사건, 근거 기사, 구조화 사실을 편집 검토용으로 묶어 봅니다.</p></header>
  <section class="toolbar">
    <div class="field"><label>관리자 세션</label><button class="btn secondary" id="logout" type="button">로그아웃</button></div>
    <div class="field small"><label for="category">분야</label><select id="category"><option value="">전체</option><option value="ai_business">AI 비즈니스</option><option value="startup">창업·부업</option><option value="policy">정책·지원사업</option></select></div>
    <div class="field small"><label for="statusFilter">상태</label><select id="statusFilter"><option value="">전체</option><option value="developing">수집 중</option><option value="ready">작성 가능</option><option value="archived">보관</option></select></div>
    <button class="btn" id="load">브리프 불러오기</button>
  </section>
  <main>
    <section class="panel list" id="list"><div class="empty">인증키를 입력하고 브리프를 불러오세요.</div></section>
    <section class="panel detail" id="detail"><div class="empty">왼쪽에서 사건을 선택하세요.</div></section>
  </main>
  <script src="/auth-session.js"></script>
  <script>
    const $=id=>document.getElementById(id); let briefs=[]; let selected=null;
    $('load').onclick=loadBriefs;
    async function loadBriefs(){
      $('load').disabled=true; $('load').textContent='불러오는 중';
      const qs=new URLSearchParams({limit:'50'}); if($('category').value)qs.set('category',$('category').value);if($('statusFilter').value)qs.set('status',$('statusFilter').value);
      qs.set('view','briefs');try{const r=await CoaAuth.request('/api/editorial/drafts?'+qs);const data=await r.json();if(!r.ok)throw new Error(data.error||`HTTP ${r.status}`);briefs=data.briefs||[];renderList();if(briefs[0])showBrief(briefs[0].id);}
      catch(e){$('list').innerHTML=`<div class="empty">${esc(e.message)}</div>`;}finally{$('load').disabled=false;$('load').textContent='브리프 불러오기';}
    }
    function renderList(){$('list').innerHTML=briefs.length?briefs.map(b=>`<button class="item ${selected===b.id?'active':''}" data-id="${b.id}"><strong>${esc(b.representative_title)}</strong><span class="meta">${label(b.category)} · ${b.event_date||'날짜 미상'}</span><span class="badges"><span class="badge">기사 ${b.article_count}</span><span class="badge official">공식 ${b.official_source_count}</span><span class="badge">사실 ${b.facts.length}</span></span></button>`).join(''):'<div class="empty">조건에 맞는 브리프가 없습니다.</div>';$('list').querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>showBrief(Number(el.dataset.id)));}
    function showBrief(id){selected=id;const b=briefs.find(x=>x.id===id);if(!b)return;renderList();const facts=b.facts.map(f=>`<div class="fact"><span class="fact-type">${esc(f.fact_type)}</span>${esc(f.fact_text)} ${f.is_official?'<span class="badge official">공식 확인</span>':''}</div>`).join('')||'<p class="muted">추출된 사실이 없습니다.</p>';const articles=b.articles.map(a=>`<div class="article"><a href="${esc(a.url)}" target="_blank" rel="noopener"><strong>${esc(a.title)}</strong></a><div class="meta">${esc(a.source_domain||'')} · 품질 ${a.quality_score} · ${esc(a.verification_status)}</div>${a.summary?`<p>${esc(a.summary)}</p>`:''}</div>`).join('');$('detail').innerHTML=`<div class="meta">${label(b.category)} · ${b.event_date||'날짜 미상'} · ${esc(b.status)}</div><h2>${esc(b.representative_title)}</h2><div class="badges"><span class="badge">기사 ${b.article_count}</span><span class="badge official">공식 출처 ${b.official_source_count}</span><span class="badge">사실 ${b.facts.length}</span></div><div class="section"><h3>확인된 사실</h3>${facts}</div><div class="section"><h3>근거 기사</h3>${articles}</div><div class="actions"><button class="btn" id="generate">AI 초안 생성</button><button class="btn secondary" id="prepare">수동 초안 준비</button><button class="btn secondary" id="copy">브리프 복사</button><a class="btn secondary" href="/editorial-drafts">편집 초안</a></div>`;$('generate').onclick=()=>generateDraft(b);$('prepare').onclick=()=>prepareDraft(b);$('copy').onclick=()=>copyBrief(b);}
    async function generateDraft(b){const button=$('generate');button.disabled=true;button.textContent='생성 중';try{const r=await CoaAuth.request('/api/editorial/drafts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({eventClusterId:b.id})});const data=await r.json();if(!r.ok)throw new Error(data.error||`HTTP ${r.status}`);location.href='/editorial-drafts?draft='+data.draft.id;}catch(e){alert(e.message)}finally{button.disabled=false;button.textContent='AI 초안 생성';}}
    function prepareDraft(b){const primary=b.articles[0]||{};localStorage.setItem('coa_news_draft_seed',JSON.stringify({title:b.representative_title,summary:[...b.facts.map(f=>f.fact_text),primary.summary].filter(Boolean).join('\n'),source_name:primary.source_domain||'COA NEWS 리서치',source_url:primary.url||'',category:b.category,event_cluster_id:b.id,references:b.articles.map(a=>a.url)}));window.open('/coanews-draft','_blank','noopener');}
    async function copyBrief(b){const text=[b.representative_title,`분야: ${label(b.category)}`,`기준일: ${b.event_date||'미상'}`,'','[확인된 사실]',...b.facts.map(f=>`- ${f.fact_text}${f.is_official?' (공식)':''}`),'','[근거 기사]',...b.articles.map(a=>`- ${a.title}\n  ${a.url}`)].join('\n');await navigator.clipboard.writeText(text);alert('브리프를 복사했습니다.');}
    function label(v){return{ai_business:'AI 비즈니스',startup:'창업·부업',policy:'정책·지원사업'}[v]||v;}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    $('logout').onclick=CoaAuth.logout;
    CoaAuth.requireSession().then((authenticated)=>{if(authenticated)loadBriefs();});
  </script>
</body>
</html>
