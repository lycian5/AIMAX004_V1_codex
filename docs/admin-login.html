<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>COA NEWS 관리자 로그인</title>
  <style>
    :root{font-family:Arial,sans-serif;color:#17202a;background:#eef2f4}*{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px}.login{width:min(420px,100%);background:#fff;border:1px solid #d7e0e4;border-radius:8px;padding:28px}.brand{color:#087ea4;font-size:14px;font-weight:800;margin-bottom:8px}h1{font-size:24px;margin:0 0 8px}p{font-size:13px;color:#65747d;line-height:1.55;margin:0 0 22px}label{display:block;font-size:13px;font-weight:700;margin-bottom:7px}input{width:100%;border:1px solid #b9c8cf;border-radius:5px;padding:12px;font:inherit}.btn{width:100%;border:0;border-radius:5px;padding:12px;margin-top:14px;background:#087ea4;color:#fff;font-weight:700;cursor:pointer}.btn:disabled{opacity:.55}.error{min-height:20px;color:#b42318;font-size:13px;margin-top:12px}.meta{border-top:1px solid #edf1f2;margin-top:18px;padding-top:14px;font-size:12px;color:#65747d}
  </style>
</head>
<body>
  <main class="login">
    <div class="brand">COA NEWS</div>
    <h1>관리자 로그인</h1>
    <p>로그인하면 수집 대시보드, 리서치 브리프와 편집 초안을 7일 동안 별도 키 입력 없이 이용할 수 있습니다.</p>
    <form id="loginForm">
      <label for="password">관리자 비밀번호</label>
      <input id="password" type="password" autocomplete="current-password" required autofocus />
      <button id="submit" class="btn" type="submit">로그인</button>
      <div id="error" class="error" role="alert"></div>
    </form>
    <div class="meta">자동화용 CRON_SECRET과 별도로 설정한 비밀번호를 사용합니다.</div>
  </main>
  <script src="/auth-session.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const submit = document.getElementById('submit');
    const error = document.getElementById('error');
    const requestedNext = new URLSearchParams(location.search).get('next') || '/research-briefs';
    const next = requestedNext.startsWith('/') && !requestedNext.startsWith('//') ? requestedNext : '/research-briefs';

    CoaAuth.session().then((authenticated) => { if (authenticated) location.replace(next); });
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      submit.disabled = true;
      error.textContent = '';
      try {
        const response = await fetch('/api/editorial/drafts', {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'login', password: document.getElementById('password').value }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || `HTTP ${response.status}`);
        location.replace(next);
      } catch (err) {
        error.textContent = err.message;
        submit.disabled = false;
      }
    });
  </script>
</body>
</html>
